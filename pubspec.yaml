name: pocket_broker_automator
description: "PocketBroker Automator - MQTT Broker/Client + Automation Engine para IoT"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  mqtt_client: ^10.2.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  provider: ^6.1.2
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.3
  flutter_local_notifications: ^17.1.2
  permission_handler: ^11.3.1
  http: ^1.2.1
  audioplayers: ^6.0.0
  url_launcher: ^6.2.6
  flutter_secure_storage: ^9.0.0
  file_picker: ^8.0.3
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
